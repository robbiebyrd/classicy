name: Release Package

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        id: setup-node-js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        id: install-npm-deps
        run: npm install

      - name: Install FFMpeg
        id: setup-ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3.1
        with:
          ffmpeg-version: release
          linking-type: static

      - name: Run Tests
        id: run-tests
        run: npm test

      - name: Build Package
        id: build-package
        run: npm run build

      - name: Bump version and push tag
        id: bump_version
        uses: phips28/gh-action-bump-version@master
        with:
          target-branch: main
          tag-prefix:  'v'
          default: patch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Use newTag output'
        run: echo "New version tag is ${{ steps.bump_version.outputs.newTag }}"

      - name: Select release codename
        if: steps.bump_version.outputs.newTag != ''
        id: codename
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t NAMES < .github/release-codenames.txt

          USED_NAMES=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json name --jq '.[].name')

          CODENAME=""
          for name in "${NAMES[@]}"; do
            if ! echo "$USED_NAMES" | grep -qxF "$name"; then
              CODENAME="$name"
              break
            fi
          done

          if [ -z "$CODENAME" ]; then
            CODENAME="Release ${{ steps.bump_version.outputs.newTag }}"
          fi

          echo "name=$CODENAME" >> "$GITHUB_OUTPUT"

      - name: Update release codename in package.json
        if: steps.bump_version.outputs.newTag != '' && steps.codename.outputs.name != ''
        run: |
          npm pkg set release="${{ steps.codename.outputs.name }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json
          git commit -m "ci: set release codename to ${{ steps.codename.outputs.name }} [skip ci]"
          git push

      - name: Create GitHub Release
        if: steps.bump_version.outputs.newTag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump_version.outputs.newTag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.codename.outputs.name }}" \
            --generate-notes

      - name: Publish to npm
        if: steps.bump_version.outputs.newTag != ''
        uses: JS-DevTools/npm-publish@v4
        with:
          token: ${{ secrets.NPM_TOKEN }}

      - name: Trigger classicy-web deploy
        if: steps.bump_version.outputs.newTag != ''
        env:
          GH_TOKEN: ${{ secrets.CLASSICY_WEB_DISPATCH_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/robbiebyrd/classicy-web/dispatches \
            -f event_type="deploy-pages" \
            -f "client_payload[tag]=${{ steps.bump_version.outputs.newTag }}"
